<div class="container">
    <div class="row">
        <div class="col-12">
            <h3>Reports</h3>
        </div>
    </div>
    <div class="row">
        <div class="col-6">
            <label>From</label>
          <input type="text"
                 placeholder="Datepicker"
                 class="form-control"
                 bsDatepicker>
        </div>
        <div class="col-6">
            <label>To:</label>
            <input type="text"
            placeholder="Datepicker"
            class="form-control"
            bsDatepicker>
        </div>
      </div>

      <div class="row" style="margin-top: 10px;">
        <div class="col">
            <select class="form-control">
                <option>Report type 1</option>
                <option>Report type 2</option>
                <option>Report type 3</option>
                <option>Report type 4   </option>
            </select>
        </div>
        

      </div>
      <div class="row" style="margin-top: 10px;">
        <div class="col">
            <button class="btn btn-primary">View Report</button>
        </div>
      </div>
</div>
